services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bps_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - idm_network

  nginx:
    image: nginx:stable-alpine
    container_name: bps_nginx
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - idm_network

  livekit:
    image: livekit/livekit-server:latest
    container_name: bps_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    networks:
      - idm_network

networks:
  idm_network:
    external: true